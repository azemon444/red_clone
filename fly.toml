# Free-tier Fly.io deploy — see DEPLOY.md
app = "santander-clone-mock"
primary_region = "ams"

[build]
  dockerfile = "mock-server/Dockerfile"

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  ASSETS_ROOT = "/app/assets/default"
  PORT = "9090"

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "santander_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
